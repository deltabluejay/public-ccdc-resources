[snoopy]
filter_chain = "exclude_spawns_of:splunkd,btool"
output = file:/var/log/snoopy.log
message_format = {"datetime": "%{datetime}", "hostname": "%{hostname}", "cmdline": "%{cmdline}", "cwd": "%{cwd}", "filename": "%{filename}", "login": "%{login}", "username": "%{username}", "uid": %{uid}, "eusername": "%{eusername}", "euid": %{euid}, "sid": %{sid}, "pid": %{pid}, "rpname": "%{rpname}", "ppid":%{ppid}, "tty": "%{tty}", "tty_username": "%{tty_username}", "tty_uid": %{tty_uid}, "ipaddr": "%{ipaddr}"}